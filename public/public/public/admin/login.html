    <div class="login-box">
        <h1>⚡ Aura Admin</h1>
        <p>Elsie Command Center</p>
        <input type="password" id="password" placeholder="Enter password">
        <button onclick="login()">Access</button>
        <p class="error" id="error">Wrong password</p>

        function login(){
            if(document.getElementById('password').value==='aura2025secure'){

                document.getElementById('error').style.display='block';
