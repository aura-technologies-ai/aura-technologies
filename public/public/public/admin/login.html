<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Admin - Login</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:system-ui,-apple-system,sans-serif}
        .login-box{background:#111;padding:40px;border-radius:12px;border:1px solid #222;width:350px;text-align:center}
        .login-box h1{color:#00C853;margin-bottom:10px;font-size:1.5rem}
        .login-box p{color:#777;margin-bottom:25px;font-size:0.85rem}
        input{width:100%;padding:12px;margin-bottom:15px;background:#000;border:1px solid #333;border-radius:6px;color:#fff;font-size:0.9rem;text-align:center}
        input:focus{outline:none;border-color:#00C853}
        button{width:100%;padding:12px;background:#00C853;color:#000;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:0.9rem}
        button:hover{background:#00e068}
        .error{color:#ff4444;margin-top:10px;display:none;font-size:0.8rem}
    </style>
</head>
<body>
    <div class="login-box">
        <h1>⚡ Aura Admin</h1>
        <p>Elsie Command Center</p>
        <input type="password" id="password" placeholder="Enter password">
        <button onclick="login()">Access</button>
        <p class="error" id="error">Wrong password</p>
    </div>
    <script>
        function login(){
            if(document.getElementById('password').value==='aura2025secure'){
                localStorage.setItem('aura_admin_auth','true');
                window.location.href='/admin/index.html';
            }else{
                document.getElementById('error').style.display='block';
            }
        }
    </script>
</body>
</html>
