<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AURA Command Center | Sign In</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#FAFBFC;display:flex;justify-content:center;align-items:center;height:100vh;font-family:system-ui,-apple-system,sans-serif}
.login-box{background:#FFFFFF;padding:45px 40px;border-radius:10px;border:1px solid #E5E7EB;width:380px;text-align:center;box-shadow:0 2px 20px rgba(0,0,0,0.05)}
.logo{font-size:1.3rem;font-weight:700;color:#0A1F44;margin-bottom:8px}
.logo span{color:#1E3A8A;font-weight:400}
.login-box p{color:#4B5563;margin-bottom:28px;font-size:0.9rem}
label{display:block;text-align:left;color:#0A1F44;font-weight:600;font-size:0.8rem;margin-bottom:6px}
input{width:100%;padding:12px 14px;margin-bottom:18px;background:#FAFBFC;border:1px solid #E5E7EB;border-radius:5px;color:#0A1F44;font-size:0.9rem;text-align:center}
input:focus{outline:none;border-color:#1E3A8A;box-shadow:0 0 0 3px rgba(30,58,138,0.1)}
button{width:100%;padding:12px;background:#C9A961;color:#0A1F44;border:none;border-radius:5px;font-weight:700;cursor:pointer;font-size:0.9rem;transition:all 0.2s}
button:hover{background:#d4b76a}
.error{color:#DC2626;margin-top:12px;display:none;font-size:0.8rem}
.footer-text{margin-top:20px;color:#94A3B8;font-size:0.7rem}
</style>
</head>
<body>
<div class="login-box">
<div class="logo">AURA <span>Command Center</span></div>
<p>Elsie AI Orchestrator</p>
<label>Password</label>
<input type="password" id="password" placeholder="Enter access code">
<button onclick="login()">Access Platform</button>
<p class="error" id="error">Invalid credentials</p>
<p class="footer-text">AURA Technologies · Secured by AURA-1</p>
</div>
<script>
function login(){
if(document.getElementById('password').value==='aura2025secure'){
localStorage.setItem('aura_admin_auth','true');
window.location.href='/admin/index.html';
}else{
document.getElementById('error').style.display='block';
}
}
</script>
</body>
</html>
